version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
    ignore:
      # Major bumps require manual review (architecture §15).
      - dependency-name: '*'
        update-types: [version-update:semver-major]
    commit-message:
      prefix: chore(deps)
      include: scope
